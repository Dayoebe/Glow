<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#047857">
    <title>Offline | Glow FM</title>
    <style>
        :root {
            color-scheme: light;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #ecfdf5, #d1fae5 45%, #ffffff);
            color: #14532d;
            padding: 1.5rem;
        }
        main {
            width: 100%;
            max-width: 32rem;
            background: #ffffff;
            border: 1px solid #a7f3d0;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 12px 28px rgba(6, 95, 70, 0.12);
        }
        h1 {
            margin: 0 0 0.75rem;
            font-size: 1.5rem;
        }
        p {
            margin: 0 0 1rem;
            line-height: 1.5;
            color: #166534;
        }
        a {
            display: inline-block;
            text-decoration: none;
            font-weight: 600;
            background: #047857;
            color: #ffffff;
            padding: 0.7rem 1rem;
            border-radius: 0.65rem;
        }
    </style>
</head>
<body>
    <main>
        <h1>You are offline</h1>
        <p>
            Glow FM could not reach the network right now. Reconnect to keep listening live and loading fresh content.
        </p>
        <a href="/">Try again</a>
    </main>
</body>
</html>
